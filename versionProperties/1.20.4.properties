# 1.20.4 version
java_version=17
minecraft_version=1.20.4
parchment_version=1.20.2:2023.12.10
compatible_minecraft_versions=["1.20.3", "1.20.4"]
accessWidenerVersion=1_20_2
builds_for=fabric,forge
# neoforge can be added once the issue with mixins has been resolved

# Netty
netty_version=4.1.97.Final

# LWJGL
lwjgl_version=3.3.2

# Fabric loader
fabric_loader_version=0.15.6
fabric_api_version=0.91.2+1.20.4
    # Fabric mod versions
    modmenu_version=9.0.0-pre.1
    starlight_version_fabric=
    phosphor_version_fabric=
    lithium_version=
    sodium_version=mc1.20.3-0.5.4
    iris_version=1.6.13+1.20.4
    bclib_version=
    canvas_version=

    # iris - needs 1.7.4+ to support the DH API
    fabric_incompatibility_list={ "iris": "<=1.7.4" }
    fabric_recommend_list={}
    
    # Fabric mod run
    # 0 = Don't enable and don't run
    # 1 = Can be referenced in code but doesn't run
    # 2 = Can be referenced in code and runs in client
    enable_mod_menu=2
    enable_starlight=0
    enable_phosphor=0
    enable_sodium=1
    enable_lithium=0
    enable_iris=1
    enable_bclib=0
    enable_canvas=0

# Forge loader
forge_version=49.1.13
neoforge_version=
    neoforge_version_range=[*,)

    # Forge mod versions
    terraforged_version=

    # Forge mod run
    # 0 = Don't enable and don't run
    # 1 = Can be referenced in code but doesn't run
    # 2 = Can be referenced in code and runs in client
    enable_starlight_forge=0
    enable_terraforged=0
    enable_terrafirmacraft=0

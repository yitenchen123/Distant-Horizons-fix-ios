# 1.21.10 version
java_version=21
minecraft_version=1.21.10
parchment_version=1.21:2024.07.28
compatible_minecraft_versions=["1.21.10"]
accessWidenerVersion=1_21_10
builds_for=fabric,neoforge
# forge is broken due to gradle/build script issues

# Netty
netty_version=4.1.97.Final

# LWJGL
lwjgl_version=3.2.3

# Fabric loader
fabric_loader_version=0.17.3
fabric_api_version=0.138.4+1.21.10
    modmenu_version=16.0.0-rc.1
    starlight_version_fabric=
    phosphor_version_fabric=
    lithium_version=
    sodium_version=mc1.21.10-0.7.2-fabric
    iris_version=1.9.6+1.21.10-fabric
    bclib_version=
    canvas_version=

    fabric_incompatibility_list={ }
    fabric_recommend_list={}
    
    # Fabric mod run
    # 0 = Don't enable and don't run
    # 1 = Can be referenced in code but doesn't run
    # 2 = Can be referenced in code and runs in client
    enable_mod_menu=2
    enable_starlight=0
    enable_phosphor=0
    enable_sodium=1
    enable_lithium=0
    enable_iris=1
    enable_bclib=0
    enable_canvas=0

# NeoForge loader
forge_version=
neoforge_version=64
    neoforge_version_range=[21.10.6-beta,)
    
    # NeoForge mod versions
    neo_iris_version=1.9.6+1.21.10-neoforge
    
    # (Neo)Forge mod run
    # 0 = Don't enable and don't run
    # 1 = Can be referenced in code but doesn't run
    # 2 = Can be referenced in code and runs in client
    neo_enable_iris=1

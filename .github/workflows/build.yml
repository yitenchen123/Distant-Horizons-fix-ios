name: Build Distant Horizons

on:
  push:
    branches: [ main, master, stable, dev ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master, stable ]
  workflow_dispatch:
    inputs:
      mc_version:
        description: 'Minecraft Version'
        required: true
        default: '1.21.1'
        type: choice
        options:
          - '1.21.11'
          - '1.21.1'
          - '1.20.1'
          - '1.19.2'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 检出代码（包含子模块）
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # 2. 设置 JDK 25
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      # 3. Gradle 缓存（加速后续构建）
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}

      # 4. 给 gradlew 执行权限
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 5. 确定 MC 版本
      - name: Set MC Version
        id: mcver
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "MC_VER=${{ github.event.inputs.mc_version }}" >> $GITHUB_ENV
          else
            # 从 gradle.properties 读取默认版本
            DEFAULT_VER=$(grep '^mcVer=' gradle.properties | cut -d'=' -f2 || echo '1.21.1')
            echo "MC_VER=$DEFAULT_VER" >> $GITHUB_ENV
          fi
          echo "Building for Minecraft $MC_VER"

      # 6. 构建 Fabric（核心平台）
      - name: Build Fabric
        run: ./gradlew :fabric:build -PmcVer=${{ env.MC_VER }} --no-daemon --stacktrace

      # 7. 构建核心模块
      - name: Build Core
        run: ./gradlew :coreSubProjects:build -PmcVer=${{ env.MC_VER }} --no-daemon --stacktrace

      # 8. 合并 Jar（生成最终可用文件）
      - name: Merge Jars
        run: ./gradlew mergeJars -PmcVer=${{ env.MC_VER }} --no-daemon --stacktrace

      # 9. 列出构建产物
      - name: List build outputs
        run: |
          echo "=== Fabric ==="
          ls -la fabric/build/libs/ || true
          echo "=== Merged ==="
          ls -la Merged/ || true
          echo "=== Core ==="
          ls -la coreSubProjects/build/libs/ || true

      # 10. 上传 Fabric Jar（供测试）
      - name: Upload Fabric Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DH-Fabric-${{ env.MC_VER }}
          path: fabric/build/libs/*.jar
          if-no-files-found: warn

      # 11. 上传合并后的 Jar（最终使用）
      - name: Upload Merged Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DH-Merged-${{ env.MC_VER }}
          path: Merged/*.jar
          if-no-files-found: warn

      # 12. 如果是打 tag，自动发布 Release
      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Distant Horizons ${{ github.ref_name }} for MC ${{ env.MC_VER }}
          files: |
            Merged/*.jar
            fabric/build/libs/*-all.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Build Distant Horizons

on:
  push:
    branches: [ main, master, stable, dev ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master, stable ]
  workflow_dispatch:
    inputs:
      mc_version:
        description: 'Minecraft Version'
        required: true
        default: '1.21.11'
        type: choice
        options:
          - '1.21.11'
          - '1.21.1'
          - '1.20.1'
          - '1.19.2'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fix coreSubProjects submodule
        run: |
          if [ ! -f "coreSubProjects/build.gradle" ]; then
            echo "coreSubProjects missing, cloning manually..."
            rm -rf coreSubProjects
            git clone --depth=1 https://gitlab.com/jeseibel/distant-horizons-core.git coreSubProjects
          else
            echo "coreSubProjects already exists"
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 关键修复：不再读取 gradle.properties 的 mcVer，直接指定 MC 版本
      - name: Set MC Version
        id: mcver
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VER="${{ github.event.inputs.mc_version }}"
          else
            VER="1.21.11"  # 默认构建 1.21.11，不再读 gradle.properties
          fi
          
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "MC_VER=$VER" >> $GITHUB_ENV
          echo ">>> Building for Minecraft $VER <<<"

      - name: Verify MC Version
        run: |
          if [ -z "${{ env.MC_VER }}" ]; then
            echo "ERROR: MC_VER is empty!"
            exit 1
          fi
          echo "Confirmed MC Version: ${{ env.MC_VER }}"

      - name: Build with Gradle
        run: ./gradlew assemble -PmcVer=${{ env.MC_VER }} --no-daemon --stacktrace

      - name: Merge Jars
        run: ./gradlew mergeJars -PmcVer=${{ env.MC_VER }} --no-daemon --stacktrace

      - name: List build outputs
        run: |
          echo "=== Fabric ==="
          ls -la fabric/build/libs/ 2>/dev/null || true
          echo "=== Merged ==="
          ls -la Merged/ 2>/dev/null || true

      - name: Upload Fabric Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DH-Fabric-${{ env.MC_VER }}
          path: fabric/build/libs/*.jar
          if-no-files-found: warn

      - name: Upload Merged Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DH-Merged-${{ env.MC_VER }}
          path: Merged/*.jar
          if-no-files-found: warn

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Distant Horizons ${{ github.ref_name }} for MC ${{ env.MC_VER }}
          files: Merged/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

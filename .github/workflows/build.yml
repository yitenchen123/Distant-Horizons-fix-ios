name: Build Distant Horizons

on:
  push:
    branches: [ main, master, stable, dev ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master, stable ]
  workflow_dispatch:
    inputs:
      mc_version:
        description: 'Minecraft Version'
        required: true
        default: '1.21.1'
        type: choice
        options:
          - '1.21.11'
          - '1.21.1'
          - '1.20.1'
          - '1.19.2'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. 修复子模块（GitHub Import 不会带子模块，需要手动拉取）
      - name: Fix coreSubProjects submodule
        run: |
          if [ ! -f "coreSubProjects/build.gradle" ]; then
            echo "coreSubProjects missing, cloning manually..."
            rm -rf coreSubProjects
            git clone --depth=1 https://gitlab.com/jeseibel/distant-horizons-core.git coreSubProjects
          else
            echo "coreSubProjects already exists"
          fi
          ls -la coreSubProjects/

      # 3. 设置 JDK 25
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      # 4. Gradle 缓存
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true

      # 5. 给 gradlew 执行权限
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 6. 确定 MC 版本
      - name: Set MC Version
        id: mcver
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "MC_VER=${{ github.event.inputs.mc_version }}" >> $GITHUB_ENV
          else
            DEFAULT_VER=$(grep '^mcVer=' gradle.properties | cut -d'=' -f2 || echo '1.21.1')
            echo "MC_VER=$DEFAULT_VER" >> $GITHUB_ENV
          fi
          echo "Building for Minecraft ${{ env.MC_VER }}"

      # 7. 构建（assemble 会自动处理所有子项目）
      - name: Build with Gradle
        run: ./gradlew assemble -PmcVer=${{ env.MC_VER }} --no-daemon --stacktrace

      # 8. 合并 Jar
      - name: Merge Jars
        run: ./gradlew mergeJars -PmcVer=${{ env.MC_VER }} --no-daemon --stacktrace

      # 9. 查看产物
      - name: List build outputs
        run: |
          echo "=== Fabric ==="
          ls -la fabric/build/libs/ 2>/dev/null || true
          echo "=== Forge ==="
          ls -la forge/build/libs/ 2>/dev/null || true
          echo "=== NeoForge ==="
          ls -la neoforge/build/libs/ 2>/dev/null || true
          echo "=== Merged ==="
          ls -la Merged/ 2>/dev/null || true

      # 10. 上传 Fabric Jar
      - name: Upload Fabric Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DH-Fabric-${{ env.MC_VER }}
          path: fabric/build/libs/*.jar
          if-no-files-found: warn

      # 11. 上传合并后的 Jar（推荐用这个）
      - name: Upload Merged Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DH-Merged-${{ env.MC_VER }}
          path: Merged/*.jar
          if-no-files-found: warn

      # 12. 打 tag 时自动发 Release
      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Distant Horizons ${{ github.ref_name }} for MC ${{ env.MC_VER }}
          files: Merged/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
